<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout - RoomRental</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 3rem;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    h1 { margin-bottom: 1rem; }
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px;
    }
    button:hover { opacity: 0.9; }
    .success { color: #4ade80; font-size: 1.2rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔓 Logout Utility</h1>
    <p>Click the button below to clear your session and return to login page</p>
    <button onclick="logout()">Clear Session & Logout</button>
    <div id="message"></div>
  </div>

  <script>
    function logout() {
      localStorage.clear();
      sessionStorage.clear();
      document.getElementById('message').innerHTML = '<div class="success">✓ Session cleared! Redirecting...</div>';
      setTimeout(() => {
        window.location.href = '/';
      }, 1500);
    }
  </script>
</body>
</html>
